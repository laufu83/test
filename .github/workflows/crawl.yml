name: 自动爬视频入库Supabase

on:
  schedule:
    - cron: "0 3 * * *"  # 每天 UTC 3点 = 北京时间 11点
  workflow_dispatch:     # 允许你手动点一下运行

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests psycopg2-binary

      - name: 运行爬虫
        run: python crawler.py
        env:
          TZ: Asia/Shanghai
