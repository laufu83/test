name: Aiven Valkey&MySQL KeepAlive
# 触发：定时每6小时 + 手动可一键运行
on:
  workflow_dispatch: # 手动点Run workflow测试
  schedule:
    - cron: '0 */6 * * *' # UTC每6小时整点执行，一天4次保活，完美防休眠

jobs:
  ping_keepalive:
    runs-on: ubuntu-latest
    steps:
      - name: Install redis-cli
        run: sudo apt update && sudo apt install redis-tools -y

      - name: Valkey SSL PING保活(rediss加密)
        env:
          HOST: ${{ vars.VALKEY_HOST }}
          PORT: ${{ vars.VALKEY_PORT }}
          RAW_PWD: ${{ secrets.VALKEY_PWD }}
        run: |
          echo "======== 调试信息 ========"
          echo "主机：$HOST"
          echo "端口：$PORT"
          echo "原始密码长度：${#RAW_PWD}"
          # 只保留可见有效字符，删除所有隐形/换行/空格/零宽字符
          PWD=$(echo -n "$RAW_PWD" | tr -dc '[:graph:]')
          echo "过滤后密码长度：${#PWD}"
          echo "==========================" 
          echo "===== Valkey保活开始 ====="
          redis-cli -h "$HOST" -p "$PORT" --tls --user default -a "$PWD" PING
          echo "===== Valkey执行结束 ====="

