name: Valkey 自动保活

on:
  schedule:
    - cron: '8 */6 * * *'  # 每 6 小时执行一次（足够保活）
  workflow_dispatch:      # 允许手动点一下执行测试

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - name: 安装 redis-cli
        run: sudo apt-get update && sudo apt-get install -y redis-tools

      - name: Valkey 保活 PING
        env:
          # 👇 把这里改成你的 Aiven Valkey 信息
          VALKEY_HOST: "valkey-fred-fred.h.aivencloud.com"
          VALKEY_PORT: 15350
          VALKEY_PASSWORD:  ${{ secrets.VALKEY_REDIS_PWD }}
        run: |
          redis-cli -h $VALKEY_HOST -p $VALKEY_PORT --tls -a $VALKEY_PASSWORD PING
