name: 自动爬视频入库Supabase
on:
  schedule:
    - cron: "0 3/8 * * *"
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: 访问 Supabase API 保活
        run: |
          curl -I "https://ertxruowkicgkxxjfuzj.supabase.co/rest/v1/?apikey=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVydHhydW93a2ljZ2t4eGpmdXpqIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4MTk4MjU5MCwiZXhwIjoyMDk3NTU4NTkwfQ.lRfKmL-gjee3ogh3n-Aaz0IndNMlbPIref9xLb7wWrY"
          echo "Supabase 已成功访问，项目保持活跃！"
          
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests psycopg2-binary pypinyin

      - name: 运行爬虫
        run: python crawler.py
        env:
          TZ: Asia/Shanghai         
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASS: ${{ secrets.DB_PASS }}
