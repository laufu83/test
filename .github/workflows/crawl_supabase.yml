name: 自动爬视频入库Supabase
on:
  schedule:
    - cron: "0 3/8 * * *"
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: 访问 Supabase API 保活
        run: |
          curl -I "https://ertxruowkicgkxxjfuzj.supabase.co/rest/v1/?apikey=${{vars.SP_APIKEY}}"
          echo "Supabase 已成功访问，项目保持活跃！"
          
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests psycopg2-binary pypinyin

      - name: 运行爬虫
        run: python crawler.py
        env:
          TZ: Asia/Shanghai         
          DB_HOST: ${{ vars.PG_HOST }}
          DB_PORT: ${{ vars.PG_PORT }}
          DB_NAME: ${{ vars.PG_DATABASE }}
          DB_USER: ${{ vars.PG_USER }}
          DB_PASS: ${{ secrets.PG_PASS }}
